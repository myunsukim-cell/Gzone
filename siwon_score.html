:root{--ink:#1a2233;--sub:#4a5670;--dim:#8b94a8;--line:#e3e8f0;--bg:#f7f9fc;--blue:#2563eb;--ok:#0e9f6e;--gold:#b07c2e}
*{box-sizing:border-box}

.wrap{max-width:820px;margin:0 auto;padding:16px}

.sub{color:var(--dim);font-size:12px;margin-bottom:14px}

.tsel{border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:14px;font-weight:700;background:#fff}
.kpi{margin-left:auto;color:var(--sub);font-size:12px}
.kpi b{color:var(--gold)}
.card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px}
.card.saved{border-color:#bfe6d2;background:#fbfffc}
.top{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
.nm{font-size:15px;font-weight:800}
.meta{color:var(--dim);font-size:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fld label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px;font-weight:600}
.fld input{width:100%;border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:14px}
.fld input:focus{outline:none;border-color:var(--blue)}
.wrong{grid-column:1 / -1}
.row2{display:flex;gap:8px;align-items:flex-end;margin-top:8px}
.btn{border:0;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;background:var(--ink);color:#fff}
.btn:disabled{opacity:.4}
.st{font-size:12px;color:var(--ok);font-weight:700}
.search{flex:1;min-width:120px;max-width:200px;border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:13px}
.hint{background:#eef4ff;border:1px solid #d3e0fb;border-radius:9px;padding:9px 12px;font-size:12px;color:#33507a;margin-bottom:12px}

const KEY="sb_publishable_stx8spRryf_4OWMFsW29Rw_XiDNfyb0";
let TEACHER="", Q="";
function hdr(){return {apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"};}
async function refresh(){
  try{ const r=await fetch(URL+"gzone_siwon_score_board",{method:"POST",headers:hdr(),body:JSON.stringify({payload:{}})});
    const d=await r.json(); if(d&&d.ok){ DATA.rows=d.rows; DATA.stat=d.stat; DATA.teachers=d.teachers; render(); } }catch(e){}

function init(){
  const ts=document.getElementById('tsel');
  (DATA.teachers||[]).forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;ts.appendChild(o);});
  ts.onchange=e=>{TEACHER=e.target.value;render();};

}
function render(){
  const st=DATA.stat;
  document.getElementById('kpi').innerHTML=`전체 ${st.total} · 중간 <b>${st.mid_done}</b> · 기말 <b>${st.final_done}</b>`;

async function save(id){
